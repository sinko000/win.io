<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Territorial.io Benzeri - Dünya Haritası & Chat</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }
        /* Giriş Ekranı */
        #auth-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .auth-box {
            background: #222;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 300px;
        }
        input {
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #333;
            color: white;
        }
        button {
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #218838; }
        .secondary-btn { background: #007bff; }
        .secondary-btn:hover { background: #0056b3; }
        #auth-msg { color: #ff4d4d; font-size: 14px; text-align: center; }

        /* Oyun Alanı */
        #game-container {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            border: 2px solid #444;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            cursor: crosshair;
        }

        /* Chat Paneli */
        #chat-container {
            width: 300px;
            background: #1e1e1e;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        #chat-messages {
            flex-grow: 1;
            padding: 10px;
            overflow-y: auto;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        #chat-input-box {
            display: flex;
            padding: 10px;
            background: #252525;
        }
        #chat-input-box input {
            flex-grow: 1;
        }
    </style>
</head>
<body>

    <!-- Giriş ve Kayıt Ekranı -->
    <div id="auth-screen">
        <div class="auth-box">
            <h2>Giriş Yap / Kayıt Ol</h2>
            <input type="text" id="username" placeholder="Kullanıcı Adı">
            <input type="password" id="password" placeholder="Şifre">
            <button onclick="login()">Giriş Yap</button>
            <button class="secondary-btn" onclick="register()">Kayıt Ol</button>
            <div id="auth-msg"></div>
        </div>
    </div>

    <!-- Oyun Ekranı -->
    <div id="game-container">
        <canvas id="gameCanvas" width="900" height="550"></canvas>
    </div>

    <!-- Sohbet (Chat) Alanı -->
    <div id="chat-container">
        <div style="background: #252525; padding: 10px; font-weight: bold; text-align: center;">Oda Sohbeti</div>
        <div id="chat-messages"></div>
        <div id="chat-input-box">
            <input type="text" id="chatInput" placeholder="Mesaj yaz..." onkeypress="checkEnter(event)">
            <button onclick="sendMessage()">Gönder</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myUsername = '';
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Dünya Haritası Arka Plan Resmi
        const worldMapImg = new Image();
        worldMapImg.src = 'https://upload.wikimedia.org/wikipedia/commons/c/cf/A_large_blank_world_map_with_oceans_marked_in_blue.PNG';

        let players = {};

        function register() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(!u || !p) return alert('Boş bırakılamaz!');
            socket.emit('register', { username: u, password: p });
        }

        function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(!u || !p) return alert('Boş bırakılamaz!');
            socket.emit('login', { username: u, password: p });
        }

        // Sunucudan gelen giriş/kayıt yanıtı
        socket.on('authResponse', (res) => {
            document.getElementById('auth-msg').innerText = res.message;
            if (res.success && res.username) {
                myUsername = res.username;
                document.getElementById('auth-screen').style.display = 'none'; // Giriş ekranını kapat
                socket.emit('joinGame', myUsername);
            }
        });

        // Haritaya tıklama (Hareket)
        canvas.addEventListener('click', (event) => {
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            socket.emit('playerMove', { x, y });
        });

        socket.on('updatePlayers', (serverPlayers) => {
            players = serverPlayers;
        });

        // Chat işlemleri
        function sendMessage() {
            const input = document.getElementById('chatInput');
            if (input.value.trim() !== '') {
                socket.emit('chatMessage', input.value);
                input.value = '';
            }
        }
        function checkEnter(e) {
            if (e.key === 'Enter') sendMessage();
        }

        socket.on('chatMessage', (data) => {
            const chatMsgs = document.getElementById('chat-messages');
            chatMsgs.innerHTML += `<div><b>${data.username}:</b> ${data.text}</div>`;
            chatMsgs.scrollTop = chatMsgs.scrollHeight;
        });

        // Oyun Döngüsü
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dünya haritasını arka plana çiz
            if (worldMapImg.complete) {
                ctx.drawImage(worldMapImg, 0, 0, canvas.width, canvas.height);
            }

            // Oyuncuları ve isimlerini çiz
            for (let id in players) {
                let p = players[id];
                ctx.beginPath();
                ctx.arc(p.x, p.y, 15, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#ffffff';
                ctx.stroke();
                ctx.closePath();

                // Oyuncu ismi
                ctx.fillStyle = '#ffffff';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(p.username, p.x, p.y - 20);
            }

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
